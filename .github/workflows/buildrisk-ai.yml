name: BuildRisk AI Analysis

on:
  push:
    branches:
      - master
      - main

  pull_request:


jobs:

  build-risk-analysis:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5

      with:
        python-version: "3.11"


    - name: Install Dependencies

      run: |

        python -m pip install --upgrade pip

        pip install -r requirements.txt


    - name: Analyze Latest Commit Risk

      run: |

        python ci_runner/buildrisk_check.py